<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="canonical" href="https://agenticphuket.com/get-an-offer/">
  <link rel="icon" href="../assets/favicon.ico">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <meta name="theme-color" content="#0f1419">
  <title>Get advice — Agentic</title>
  <meta property="og:type" content="website">
  <meta property="og:title" content="Get advice — Agentic">
  <meta property="og:description" content="Request your Agentic advisory overview. We match you to the right buying, investing, or development pathway.">
  <meta property="og:image" content="https://v3b.fal.media/files/b/0a9edf53/og-agentic-brand.png">
  <style>
    :root { --bg: #0f1419; --surface: #1a2130; --gold: #c5a059; --text: #e6e7ea; --muted: #b0b8c4; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid #e5e7eb; }
    nav a { color: var(--text); text-decoration: none; margin: 0 12px; font-weight: 600; font-size: 14px; letter-spacing: 0.4px; text-transform: uppercase; }
    nav a:hover { color: var(--gold); }
    .nav-logo { height: 26px; width: auto; display: block; }
    .hero { position: relative; min-height: 60vh; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; padding-top: 64px; }
    .hero::before { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(12,16,23,0.5) 0%, rgba(12,16,23,0.7) 100%); pointer-events: none; }
    .hero__media { position: absolute; inset: 0; z-index: 0; }
    .hero__media img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
    .hero__content { position: relative; z-index: 1; max-width: 920px; padding: 40px 24px; }
    .hero h1 { font-size: clamp(32px, 5vw, 56px); margin: 0 0 16px; letter-spacing: -0.5px; }
    .hero p { color: var(--muted); font-size: 18px; max-width: 720px; margin: 0 auto 32px; }
    .section { padding: 40px 24px; }
    .section.alt { background: var(--surface); }
    .label { color: var(--gold); font-weight: 700; font-size: 13px; letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 12px; }
    .grid { display: grid; gap: 24px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
    .card { background: #111827; border: 1px solid var(--border); border-radius: 14px; padding: 24px; }
    .card h3 { margin: 0 0 10px; font-size: 18px; }
    .card p { margin: 0; color: var(--muted); line-height: 1.6; }
    .form-wrap { max-width: 720px; margin: 0 auto; }
    .form-row { display: grid; gap: 16px; grid-template-columns: 1fr; margin-bottom: 16px; }
    @media (min-width: 720px) {
      .form-row--2 { grid-template-columns: 1fr 1fr; }
      .form-row--3 { grid-template-columns: 1fr 1fr 1fr; }
    }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    input, select, textarea { width: 100%; background: #111827; color: #e6e7ea; border: 1px solid #374151; border-radius: 10px; padding: 12px 14px; font-size: 16px; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: var(--gold); }
    .btn { background: var(--gold); color: #fff; border: none; padding: 14px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; font-size: 16px; text-decoration: none; display: inline-block; text-align: center; }
    .btn:hover { filter: brightness(1.05); }
    #formStatus { display: none; margin-top: 14px; padding: 12px; border-radius: 10px; text-align: center; font-size: 14px; }
    footer { text-align: center; padding: 40px 24px; color: var(--muted); font-size: 13px; }
    footer a { color: var(--text); text-decoration: underline; }
    .step { background: #111827; border: 1px solid var(--border); border-radius: 14px; padding: 22px; }
    .step span { color: var(--gold); font-weight: 700; font-size: 13px; letter-spacing: 0.6px; text-transform: uppercase; }
    .step h3 { margin: 6px 0 8px; font-size: 18px; }
    .step p { margin: 0; color: var(--muted); line-height: 1.6; }
    .pill-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 28px 0; }
    .pill { padding: 10px 18px; border-radius: 999px; border: 1px solid var(--border); color: var(--text); font-size: 14px; font-weight: 600; background: #0f1419; }
  </style>
</head>
<body>
  <nav>
    <img loading="lazy" class="nav-logo" src="../assets/images/agentic-logo.png" alt="Agentic">
    <div>
      <a href="/">Home</a>
      <a href="/projects">Projects</a>
      <a href="/get-an-offer/">Get advice</a>
      <a href="/investors">Investors</a>
      <a href="/phuket-insights/">Phuket Insights</a>
    </div>
  </nav>

  <section class="hero" style="min-height: auto; padding: 120px 24px 60px;">
    <div class="hero__media">
      <img loading="lazy" src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/Phuket_Aerial.jpg/960px-Phuket_Aerial.jpg?v=offer" alt="Phuket coastline hero" style="width:100%;height:100%;object-fit:cover;filter:brightness(0.5);">
    </div>
    <div class="hero__content">
      <img src="../assets/images/agentic-logo.png" alt="Agentic" style="height:60px;margin-bottom:16px;">
      <p>Tell us your situation. We’ll prepare a tailored advisory overview.</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="label">Request advisory overview</div>
      <div class="form-wrap">
        <form id="leadForm" name="leadForm" method="POST" action="https://agentic-quote-api-wj5v.onrender.com/api/generate-quote">
          <input type="hidden" name="bot-field">
          <input type="hidden" name="landing_page" value="Get advice">
          <input type="hidden" name="timestamp" id="timestamp">

          <div class="form-row form-row--2">
            <div>
              <label for="name">Full name *</label>
              <input type="text" id="name" name="name" placeholder="Your name" required>
            </div>
            <div>
              <label for="email">Email *</label>
              <input type="email" id="email" name="email" placeholder="you@company.com" required>
            </div>
          </div>

          <div class="form-row form-row--2">
            <div>
              <label for="phone">Phone *</label>
              <input type="tel" id="phone" name="phone" placeholder="+66 98 860 6410" required>
            </div>
            <div>
              <label for="country">Country / base</label>
              <input type="text" id="country" name="country" placeholder="e.g. Thailand, Germany, Russia">
            </div>
          </div>

          <div class="form-row form-row--2">
            <div>
              <label for="intent">Primary intent *</label>
              <select id="intent" name="intent" required>
                <option value="">Select…</option>
                <option value="buy-to-live">Buy to live</option>
                <option value="buy-to-invest">Buy to invest / rent out</option>
                <option value="partner-investor">Partner as investor / developer</option>
                <option value="exploring">Exploring</option>
                <option value="other">Other — tell us in notes</option>
              </select>
            </div>
            <div>
              <label for="budget_range">Budget range</label>
              <select id="budget_range" name="budget_range">
                <option value="">Select…</option>
                <option value="under-5m">Under THB 5M</option>
                <option value="5m-20m">THB 5M – 20M</option>
                <option value="20m-100m">THB 20M – 100M</option>
                <option value="100m-plus">THB 100M+</option>
              </select>
            </div>
          </div>

          <div class="form-row form-row--2">
            <div>
              <label for="timeline">Timeline</label>
              <select id="timeline" name="timeline">
                <option value="">Select…</option>
                <option value="now">Now</option>
                <option value="3-months">Within 3 months</option>
                <option value="6-months">Within 6 months</option>
                <option value="exploring">Exploring</option>
              </select>
            </div>
            <div>
              <label for="spending_style">How ready are you?</label>
              <select id="spending_style" name="spending_style">
                <option value="">Select…</option>
                <option value="ready">Ready to proceed</option>
                <option value="evaluating">Evaluating options</option>
                <option value="researching">Just researching</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div>
              <label for="message">Notes (optional)</label>
              <textarea id="message" name="message" rows="4" placeholder="What are you looking for?"></textarea>
            </div>
          </div>

          <button type="submit" class="btn">Request advisory overview →</button>
          <div id="formStatus" style="display:none;margin-top:14px;text-align:center;padding:10px;border-radius:8px;"></div>
        </form>
      </div>
    </div>
  </section>

  <footer>
    <p>© <span id="year"></span> Agentic. All rights reserved. · info@agenticphuket.com · +66 98 860 6410</p>
  </footer>

  <script>
    /* Configure quote API endpoint for production.
       Example: window.API_BASE = 'https://your-api.onrender.com';
    */
    window.API_BASE = 'https://agentic-quote-api-wj5v.onrender.com';
    document.getElementById('year').textContent = new Date().getFullYear();
    (function init(){
      const ts = document.getElementById('timestamp');
      if(ts) ts.value = new Date().toISOString();

      const form = document.getElementById('leadForm');
      const status = document.getElementById('formStatus');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        status.style.display = 'block';
        status.style.background = '#1a2130';
        status.style.color = '#c5a059';
        status.textContent = 'Generating your advisory overview…';

        try {
          const payload = new URLSearchParams(new FormData(form));
          const API_BASE = window.API_BASE || '';
          const url = API_BASE + '/api/generate-quote';
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: payload
          });

          if (!res.ok) throw new Error('Server error ' + res.status);

          const blob = await res.blob();
          const dl = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = dl;
          const disposition = res.headers.get('Content-Disposition');
          const match = disposition && disposition.match(/filename="([^"]+)"/);
          a.download = match ? match[1] : 'Agentic-Advisory.pdf';
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(dl);

          status.style.background = '#14302a';
          status.style.color = '#7ee3b8';
          status.textContent = 'Advisory overview downloaded. We also sent it by email.';
        } catch (err) {
          status.style.background = '#2a1116';
          status.style.color = '#fca5a5';
          status.textContent = 'Something went wrong. Please email info@agenticphuket.com.';
        }
      });
    })();
  </script>
</body>
</html>
